kind = "web"
previewPath = "/"
title = "ChainTrack"
version = "1.0.0"
id = "artifacts/chaintrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/chaintrack run dev:serve"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chaintrack", "run", "build" ]
publicDir = "artifacts/chaintrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
